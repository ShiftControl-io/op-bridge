name: CLA Assistant

on:
  pull_request_target:
    types: [opened, synchronize]

  # Only fires when someone comments on a PR (not issues)
  # The job-level `if` further filters to CLA-related comments only
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Check
    runs-on: ubuntu-latest
    # Skip entirely unless: (a) it's a PR event, or (b) it's a comment on a PR with the CLA phrase
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event.issue.pull_request &&
       (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
        github.event.comment.body == 'recheck'))
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/ShiftControl-io/op-bridge/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'shiftcontrol-dan,dependabot[bot],github-actions[bot]'
          remote-organization-name: 'ShiftControl-io'
          remote-repository-name: 'op-bridge'
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign the [Contributor License Agreement](https://github.com/ShiftControl-io/op-bridge/blob/main/CLA.md).

            To sign, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            This is a one-time requirement.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
