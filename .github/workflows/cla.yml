name: CLA Assistant

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Check
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/ShiftControl-io/op-bridge/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'shiftcontrol-dan,dependabot[bot],github-actions[bot]'
          remote-organization-name: 'ShiftControl-io'
          remote-repository-name: 'op-bridge'
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign the [Contributor License Agreement](https://github.com/ShiftControl-io/op-bridge/blob/main/CLA.md).

            To sign, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            This is a one-time requirement.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
