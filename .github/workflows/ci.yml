name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_IGNORE_SERVER_IO_ERROR: "true"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      - name: Setup sccache
        id: sccache
        uses: mozilla-actions/sccache-action@2df7dbab909c49ab7d3382d05da469f3f975c2d6 # v0.0.7
        continue-on-error: true

      - name: Enable sccache
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          if sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache server failed to start, building without cache"
          fi

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          key: lint

      - name: cargo fmt --check
        run: |
          if ! cargo fmt --all -- --check; then
            echo "::error::Formatting check failed. Run 'cargo fmt --all' locally and commit."
            exit 1
          fi

      - name: cargo clippy -- -D warnings
        run: cargo clippy -- -D warnings

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Setup sccache
        id: sccache
        uses: mozilla-actions/sccache-action@2df7dbab909c49ab7d3382d05da469f3f975c2d6 # v0.0.7
        continue-on-error: true

      - name: Enable sccache
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          if sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache server failed to start, building without cache"
          fi

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          key: test

      - name: cargo check
        run: cargo check

      - name: cargo test
        run: cargo test --verbose

  audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install cargo-audit
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # cargo-llvm-cov
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit

  build:
    name: Build (${{ matrix.target }})
    needs: [lint, test, audit]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux amd64 (most Docker hosts, CI runners)
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: op-bridge-linux-amd64
            cross_packages: musl-tools

          # Linux arm64 (AWS Graviton, Apple Silicon Docker, Raspberry Pi)
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: op-bridge-linux-arm64
            cross_packages: musl-tools gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        id: sccache
        uses: mozilla-actions/sccache-action@2df7dbab909c49ab7d3382d05da469f3f975c2d6 # v0.0.7
        continue-on-error: true

      - name: Enable sccache
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          if sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache server failed to start, building without cache"
          fi

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          key: build-${{ matrix.target }}
          cache-targets: "false"

      - name: Install cross-compilation tools
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross_packages }}

      - name: Set cross-linker
        if: matrix.linker
        run: |
          echo "CARGO_TARGET_$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary
        run: file target/${{ matrix.target }}/release/op-bridge

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/op-bridge
          retention-days: 7
