name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: op-bridge-linux-amd64
            cross_packages: musl-tools

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: op-bridge-linux-arm64
            cross_packages: musl-tools gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        id: sccache
        uses: mozilla-actions/sccache-action@2df7dbab909c49ab7d3382d05da469f3f975c2d6 # v0.0.7
        continue-on-error: true

      - name: Enable sccache
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          if sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache server failed to start, building without cache"
          fi

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          key: release-${{ matrix.target }}
          cache-targets: "false"

      - name: Install cross-compilation tools
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross_packages }}

      - name: Set cross-linker
        if: matrix.linker
        run: |
          echo "CARGO_TARGET_$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf /tmp/${{ matrix.artifact }}.tar.gz op-bridge
          shasum -a 256 /tmp/${{ matrix.artifact }}.tar.gz > /tmp/${{ matrix.artifact }}.tar.gz.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: /tmp/${{ matrix.artifact }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            /tmp/${{ matrix.artifact }}.tar.gz
            /tmp/${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Try to get changelog from git log since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi

          cat > $RUNNER_TEMP/notes.md << EOF
          ## op-bridge $VERSION

          ### Changes

          $CHANGES

          ### Binaries

          | Platform | Binary | SHA256 |
          |----------|--------|--------|
          | Linux x86_64 (amd64) | \`op-bridge-linux-amd64.tar.gz\` | See \`.sha256\` file |
          | Linux aarch64 (arm64) | \`op-bridge-linux-arm64.tar.gz\` | See \`.sha256\` file |

          ### Installation

          \`\`\`bash
          # Download and extract (linux/amd64 example)
          curl -fsSL https://github.com/ShiftControl-io/op-bridge/releases/download/$TAG/op-bridge-linux-amd64.tar.gz | tar xz
          chmod +x op-bridge
          sudo mv op-bridge /usr/local/bin/
          \`\`\`

          ### Verify

          \`\`\`bash
          # Check SHA256
          shasum -a 256 -c op-bridge-linux-amd64.tar.gz.sha256
          \`\`\`
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE=""
          if echo "$TAG" | grep -qE '(alpha|beta|rc|pre)'; then
            PRERELEASE="--prerelease"
          fi

          gh release create "$TAG" \
            --title "op-bridge ${{ steps.notes.outputs.version }}" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            $PRERELEASE \
            artifacts/*
