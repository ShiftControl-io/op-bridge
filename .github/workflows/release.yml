name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: op-bridge-linux-amd64
            cross_packages: musl-tools

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: op-bridge-linux-arm64
            cross_packages: musl-tools gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc

          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: op-bridge-macos-arm64

          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: op-bridge-macos-amd64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2
        with:
          key: release-${{ matrix.target }}
          cache-targets: "false"

      - name: Install cross-compilation tools
        if: matrix.cross_packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross_packages }}

      - name: Set cross-linker
        if: matrix.linker
        run: |
          echo "CARGO_TARGET_$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf /tmp/${{ matrix.artifact }}.tar.gz op-bridge
          shasum -a 256 /tmp/${{ matrix.artifact }}.tar.gz > /tmp/${{ matrix.artifact }}.tar.gz.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: /tmp/${{ matrix.artifact }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            /tmp/${{ matrix.artifact }}.tar.gz
            /tmp/${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi

          cat > $RUNNER_TEMP/notes.md << EOF
          ## op-bridge $VERSION

          ### Changes

          $CHANGES

          ### Binaries

          | Platform | Binary | SHA256 |
          |----------|--------|--------|
          | Linux x86_64 (amd64) | \`op-bridge-linux-amd64.tar.gz\` | See \`.sha256\` file |
          | Linux aarch64 (arm64) | \`op-bridge-linux-arm64.tar.gz\` | See \`.sha256\` file |
          | macOS Apple Silicon (arm64) | \`op-bridge-macos-arm64.tar.gz\` | See \`.sha256\` file |
          | macOS Intel (amd64) | \`op-bridge-macos-amd64.tar.gz\` | See \`.sha256\` file |

          ### Installation

          \`\`\`bash
          # Download and extract (linux/amd64 example)
          curl -fsSL https://github.com/ShiftControl-io/op-bridge/releases/download/$TAG/op-bridge-linux-amd64.tar.gz | tar xz
          chmod +x op-bridge
          sudo mv op-bridge /usr/local/bin/
          \`\`\`

          ### Verify

          \`\`\`bash
          # Check SHA256
          shasum -a 256 -c op-bridge-linux-amd64.tar.gz.sha256
          \`\`\`
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE=""
          if echo "$TAG" | grep -qE '(alpha|beta|rc|pre)'; then
            PRERELEASE="--prerelease"
          fi

          gh release create "$TAG" \
            --title "op-bridge ${{ steps.notes.outputs.version }}" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            $PRERELEASE \
            artifacts/*
